<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthy Journey Recipes</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand" href="#">Healthy Recipes</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#recipes">Recipes</a></li>
        <li class="nav-item"><a class="nav-link" href="#gallery">Gallery</a></li>
        <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
      </ul>
      <button class="btn btn-light ms-3" onclick="toggleTheme()"></button>
    </div>
  </div>
</nav>

<!-- HERO -->
<section id="home" class="container mt-4 text-center">
<h1>Welcome to Healthy Journey</h1>
<p>Simple and healthy recipes for everyone</p>
</section>

<!-- CAROUSEL -->
<div id="carouselExample" class="carousel slide container mt-4" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd" class="d-block w-100" alt="food">
    </div>
    <div class="carousel-item">
      <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061" class="d-block w-100" alt="food">
    </div>
  </div>
</div>

<!-- CARDS -->
<section id="recipes" class="container mt-5">
<h2 class="text-center">Recipes</h2>
<div class="row">
  <div class="col-md-4">
    <div class="card">
      <div class="card-body">Vegetable Salad</div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card">
      <div class="card-body">Fruit Smoothie</div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card">
      <div class="card-body">Oats Breakfast</div>
    </div>
  </div>
</div>
</section>

<!-- ACCORDION -->
<section class="container mt-5">
<h2>Tips</h2>
<div class="accordion" id="accordionExample">
  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#collapseOne">Diet Tips</button>
    </h2>
    <div id="collapseOne" class="accordion-collapse collapse show">
      <div class="accordion-body">Eat fruits and vegetables.</div>
    </div>
  </div>
</div>
</section>

<!-- MODAL BUTTON -->
<div class="text-center mt-4">
<button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#exampleModal">Join Us</button>
</div>

<!-- MODAL -->
<div class="modal fade" id="exampleModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-body">Welcome to Healthy Journey!</div>
    </div>
  </div>
</div>

<!-- CONTACT FORM -->
<section id="contact" class="container mt-5">
<h2>Contact</h2>
<form onsubmit="return validateForm()">
<input id="email" class="form-control mb-2" placeholder="Email">
<button class="btn btn-success">Submit</button>
</form>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
<p>© 2026 Kamaljit Kaur | <a href="https://github.com/your-username" class="text-white">GitHub</a></p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- External JS -->
<script src="js/script.js"></script>

</body>
</html>
